name: Build & Distribute

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Install Gradle directly — the repo is missing gradlew/gradlew.bat
      # and gradle-wrapper.jar. Pinned to the version declared in
      # gradle/wrapper/gradle-wrapper.properties so dev + CI stay aligned.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarttrip-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Firebase App Distribution ──────────────────────────────────────
      # Requires the following GitHub secrets to be set:
      #   FIREBASE_APP_ID                → Firebase console > Project settings > Android app > App ID
      #   FIREBASE_SERVICE_ACCOUNT_JSON  → Firebase console > Project settings > Service accounts > Generate new private key (JSON content)
      # And a GitHub Variable FIREBASE_ENABLED=true to turn this step on.
      - name: Distribute to Firebase App Distribution
        if: ${{ vars.FIREBASE_ENABLED == 'true' }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          releaseNotes: |
            Build from commit ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          file: app/build/outputs/apk/debug/app-debug.apk
